<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>URS-to-GMP Layout Generation Pipeline with Coordinate Solver</title>
  <desc>Pipeline diagram for research poster: URS template input, parsing, rule engine, RAG validation, layout solver for coordinate computation, drawing agent, and final GMP-compliant layout output.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#20242a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6f7782"/>
    </marker>
    <linearGradient id="final-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef7f1"/>
      <stop offset="100%" stop-color="#f8f8ee"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2933" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    svg {
      background: #fbfaf6;
    }
    .title {
      font: 700 28px Arial, Helvetica, sans-serif;
      fill: #20242a;
      text-anchor: middle;
    }
    .subtitle {
      font: 400 14px Arial, Helvetica, sans-serif;
      fill: #58606b;
      text-anchor: middle;
    }
    .section-label {
      font: 700 12px Arial, Helvetica, sans-serif;
      fill: #6f7782;
      letter-spacing: 1.4px;
      text-anchor: middle;
    }
    .main-box {
      fill: #ffffff;
      stroke: #20242a;
      stroke-width: 2;
      filter: url(#soft-shadow);
    }
    .solver-box {
      fill: #f2f8fb;
      stroke: #23566c;
      stroke-width: 2.2;
      filter: url(#soft-shadow);
    }
    .final-box {
      fill: url(#final-fill);
      stroke: #2d5a3b;
      stroke-width: 2.2;
      filter: url(#soft-shadow);
    }
    .kb-box {
      fill: #fffaf0;
      stroke: #7a642f;
      stroke-width: 1.8;
      stroke-dasharray: 7 5;
      filter: url(#soft-shadow);
    }
    .logic-box {
      fill: #f5f1fb;
      stroke: #60497a;
      stroke-width: 1.8;
      stroke-dasharray: 7 5;
      filter: url(#soft-shadow);
    }
    .stage {
      font: 700 18px Arial, Helvetica, sans-serif;
      fill: #20242a;
      text-anchor: middle;
    }
    .stage-small {
      font: 700 15px Arial, Helvetica, sans-serif;
      fill: #20242a;
      text-anchor: middle;
    }
    .sub {
      font: 400 13px Arial, Helvetica, sans-serif;
      fill: #4d5661;
      text-anchor: middle;
    }
    .tiny {
      font: 400 11px Arial, Helvetica, sans-serif;
      fill: #626b76;
      text-anchor: middle;
    }
    .kb-title {
      font: 700 15px Arial, Helvetica, sans-serif;
      fill: #20242a;
      text-anchor: middle;
    }
    .kb-sub {
      font: 400 12px Arial, Helvetica, sans-serif;
      fill: #555d66;
      text-anchor: middle;
    }
    .edge-label {
      font: 400 12px Arial, Helvetica, sans-serif;
      fill: #4d5661;
    }
    .flow {
      stroke: #20242a;
      stroke-width: 2;
      fill: none;
    }
    .lookup {
      stroke: #6f7782;
      stroke-width: 1.8;
      stroke-dasharray: 5 5;
      fill: none;
    }
    .feedback {
      stroke: #6f7782;
      stroke-width: 1.8;
      stroke-dasharray: 6 5;
      fill: none;
    }
    .chip {
      fill: #ffffff;
      stroke: #8fb4c1;
      stroke-width: 1.2;
    }
    .chip-text {
      font: 600 11px Arial, Helvetica, sans-serif;
      fill: #23566c;
      text-anchor: middle;
    }
    .legend-text {
      font: 400 12px Arial, Helvetica, sans-serif;
      fill: #20242a;
    }
  </style>

  <text class="title" x="600" y="52">URS-to-GMP Layout Generation Pipeline</text>
  <text class="subtitle" x="600" y="78">Rule extraction, RAG validation, coordinate solving, and SVG floorplan rendering</text>

  <text class="section-label" x="430" y="120">MAIN PIPELINE</text>
  <text class="section-label" x="895" y="120">REFERENCE / LOGIC BASES</text>

  <rect class="main-box" x="295" y="140" width="270" height="58" rx="8"/>
  <text class="stage" x="430" y="164">User / Designer</text>
  <text class="sub" x="430" y="184">fills facility requirements</text>

  <line class="flow" x1="430" y1="198" x2="430" y2="228" marker-end="url(#arrow)"/>

  <rect class="main-box" x="295" y="228" width="270" height="72" rx="8"/>
  <text class="stage" x="430" y="253">URS Template (.xlsx)</text>
  <text class="sub" x="430" y="273">process, room, equipment sheets</text>
  <text class="tiny" x="430" y="290">Excel / JSON input</text>

  <line class="flow" x1="430" y1="300" x2="430" y2="332" marker-end="url(#arrow)"/>
  <text class="edge-label" x="445" y="318">structured table data</text>

  <rect class="main-box" x="295" y="332" width="270" height="70" rx="8"/>
  <text class="stage" x="430" y="357">URS Parser</text>
  <text class="sub" x="430" y="377">converts sheets to input JSON</text>
  <text class="tiny" x="430" y="394">rooms, equipment, flows, constraints</text>

  <line class="flow" x1="430" y1="402" x2="430" y2="434" marker-end="url(#arrow)"/>
  <text class="edge-label" x="445" y="421">input JSON</text>

  <rect class="main-box" x="280" y="434" width="300" height="88" rx="8"/>
  <text class="stage" x="430" y="461">Rule Engine</text>
  <text class="sub" x="430" y="481">derives adjacency, flow, area, DP, AL</text>
  <text class="tiny" x="430" y="500">converts URS into layout constraint blocks</text>

  <rect class="kb-box" x="715" y="437" width="290" height="82" rx="8"/>
  <text class="kb-title" x="860" y="463">GMP Layout Logic</text>
  <text class="kb-sub" x="860" y="483">12 rule modules + room / equipment KB</text>
  <text class="kb-sub" x="860" y="502">adjacency, DP, clean corridor, AL type</text>
  <line class="lookup" x1="715" y1="478" x2="584" y2="478" marker-end="url(#arrow-muted)"/>

  <line class="flow" x1="430" y1="522" x2="430" y2="554" marker-end="url(#arrow)"/>
  <text class="edge-label" x="445" y="542">constraint blocks</text>

  <rect class="main-box" x="280" y="554" width="300" height="88" rx="8"/>
  <text class="stage" x="430" y="581">Validation Agent</text>
  <text class="sub" x="430" y="601">RAG-based GMP compliance check</text>
  <text class="tiny" x="430" y="620">flags violations before drawing</text>

  <rect class="kb-box" x="715" y="557" width="290" height="82" rx="8"/>
  <text class="kb-title" x="860" y="583">GMP RAG DB</text>
  <text class="kb-sub" x="860" y="603">FDA / EU / WHO / ISO 14644 chunks</text>
  <text class="kb-sub" x="860" y="622">retrieved clauses for validation evidence</text>
  <line class="lookup" x1="715" y1="598" x2="584" y2="598" marker-end="url(#arrow-muted)"/>

  <path class="feedback" d="M 280 598 C 190 598 155 545 155 490 C 155 428 192 381 260 371 L 292 371" marker-end="url(#arrow-muted)"/>
  <text class="edge-label" x="97" y="497">violation detected</text>
  <text class="edge-label" x="112" y="516">revise URS / rules</text>

  <line class="flow" x1="430" y1="642" x2="430" y2="674" marker-end="url(#arrow)"/>
  <text class="edge-label" x="445" y="663">approved constraints</text>

  <rect class="solver-box" x="245" y="674" width="370" height="118" rx="10"/>
  <text class="stage" x="430" y="701">Layout Solver / Coordinate Planner</text>
  <text class="sub" x="430" y="722">computes room coordinates from GMP constraints</text>
  <g>
    <rect class="chip" x="270" y="739" width="100" height="24" rx="12"/>
    <text class="chip-text" x="320" y="755">constraint graph</text>
    <rect class="chip" x="382" y="739" width="92" height="24" rx="12"/>
    <text class="chip-text" x="428" y="755">room sizing</text>
    <rect class="chip" x="486" y="739" width="104" height="24" rx="12"/>
    <text class="chip-text" x="538" y="755">placement score</text>
    <rect class="chip" x="290" y="768" width="132" height="24" rx="12"/>
    <text class="chip-text" x="356" y="784">flow / corridor routing</text>
    <rect class="chip" x="438" y="768" width="132" height="24" rx="12"/>
    <text class="chip-text" x="504" y="784">x-y coordinate output</text>
  </g>

  <rect class="logic-box" x="715" y="692" width="290" height="82" rx="8"/>
  <text class="kb-title" x="860" y="718">Layout Optimization Logic</text>
  <text class="kb-sub" x="860" y="738">packing, routing, collision checks</text>
  <text class="kb-sub" x="860" y="757">objective: GMP score + compactness</text>
  <line class="lookup" x1="715" y1="733" x2="619" y2="733" marker-end="url(#arrow-muted)"/>

  <line class="flow" x1="430" y1="792" x2="430" y2="823" marker-end="url(#arrow)"/>
  <text class="edge-label" x="445" y="813">coordinates + topology</text>

  <rect class="main-box" x="295" y="823" width="270" height="58" rx="8"/>
  <text class="stage-small" x="430" y="846">Drawing Agent</text>
  <text class="sub" x="430" y="866">renders SVG floorplan + annotations</text>

  <path class="flow" d="M 565 852 L 690 852" marker-end="url(#arrow)"/>

  <rect class="final-box" x="715" y="823" width="290" height="58" rx="8"/>
  <text class="stage-small" x="860" y="846">Final GMP-Compliant Layout</text>
  <text class="sub" x="860" y="866">SVG / coordinates / validation report</text>

  <g transform="translate(77, 839)">
    <rect class="main-box" x="0" y="0" width="18" height="18" rx="4" filter="none"/>
    <text class="legend-text" x="27" y="14">Pipeline stage</text>
    <rect class="kb-box" x="0" y="32" width="18" height="18" rx="4" filter="none"/>
    <text class="legend-text" x="27" y="46">Knowledge base</text>
    <line class="flow" x1="0" y1="70" x2="34" y2="70" marker-end="url(#arrow)"/>
    <text class="legend-text" x="45" y="74">Data flow</text>
    <line class="lookup" x1="0" y1="94" x2="34" y2="94" marker-end="url(#arrow-muted)"/>
    <text class="legend-text" x="45" y="98">Reference / lookup</text>
  </g>
</svg>
