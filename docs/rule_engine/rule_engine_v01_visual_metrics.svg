<svg viewBox="0 0 760 760" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Rule Engine v0.1 - End-to-end Demo Visualization</title>
  <desc>실제 URS (48 Rooms, 65 Equipment) 입력으로 run_rule_engine을 실행한 결과. 상단은 룰별 적용 횟수와 flag 분포 막대 차트, 하단은 process flow + 엘리베이터 anchor + 핵심 AL 다이어그램.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <style>
    .panel-title { font: 700 14px system-ui, sans-serif; fill: #1a1a1a; }
    .sub { font: 400 10px system-ui, sans-serif; fill: #666; }
    .bar-bg { fill: #f0f0f0; }
    .bar-fg { fill: #1a1a1a; }
    .bar-flag { fill: #d97757; }
    .bar-label { font: 400 10px system-ui, sans-serif; fill: #1a1a1a; }
    .bar-count { font: 600 10px system-ui, sans-serif; fill: #1a1a1a; }
    .stat-num { font: 700 28px system-ui, sans-serif; fill: #1a1a1a; }
    .stat-label { font: 400 10px system-ui, sans-serif; fill: #666; text-anchor: middle; }
    .room { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1.2; }
    .elev { fill: #e8efe7; stroke: #1a1a1a; stroke-width: 1.2; }
    .lbl { font: 600 11px system-ui, sans-serif; fill: #1a1a1a; text-anchor: middle; }
    .lbl-sub { font: 400 9px system-ui, sans-serif; fill: #666; text-anchor: middle; }
    .edge { stroke: #1a1a1a; stroke-width: 1.4; fill: none; }
    .edge-elev { stroke: #888; stroke-width: 1; stroke-dasharray: 4 3; fill: none; }
  </style>

  <text class="panel-title" x="20" y="22">Demo run - input URS</text>
  <text class="sub" x="20" y="36">URS_ConceptualDesign for layout_0516.xlsx - input_hash=cba2bc09d96f</text>

  <g transform="translate(20, 50)">
    <rect class="room" x="0" y="0" width="110" height="56" rx="6"/>
    <text class="stat-num" x="55" y="32" text-anchor="middle">48</text>
    <text class="stat-label" x="55" y="48">rooms</text>

    <rect class="room" x="120" y="0" width="110" height="56" rx="6"/>
    <text class="stat-num" x="175" y="32" text-anchor="middle">18</text>
    <text class="stat-label" x="175" y="48">airlocks</text>

    <rect class="room" x="240" y="0" width="110" height="56" rx="6"/>
    <text class="stat-num" x="295" y="32" text-anchor="middle">23</text>
    <text class="stat-label" x="295" y="48">adjacency edges</text>

    <rect class="room" x="360" y="0" width="110" height="56" rx="6"/>
    <text class="stat-num" x="415" y="32" text-anchor="middle">399</text>
    <text class="stat-label" x="415" y="48">rationale entries</text>

    <rect class="room" x="480" y="0" width="110" height="56" rx="6"/>
    <text class="stat-num" x="535" y="32" text-anchor="middle" fill="#d97757">28</text>
    <text class="stat-label" x="535" y="48">flags (20/4/4)</text>

    <rect class="room" x="600" y="0" width="120" height="56" rx="6"/>
    <text class="stat-num" x="660" y="32" text-anchor="middle">122/122</text>
    <text class="stat-label" x="660" y="48">unit tests PASS</text>
  </g>

