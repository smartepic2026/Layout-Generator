    <rect class="elev" x="0" y="60" width="70" height="40" rx="6"/>
    <text class="lbl" x="35" y="78">ELEVATOR</text>
    <text class="lbl-sub" x="35" y="91">material in (12)</text>

    <line class="edge-elev" x1="70" y1="80" x2="105" y2="80" marker-end="url(#arrm)"/>

