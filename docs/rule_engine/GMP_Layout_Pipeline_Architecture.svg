<svg viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GMP Layout Rule Engine — System Architecture</title>
  <desc>웹폼 URS 입력 → URS Parser → Rule Engine (GMP Layout Logic 룰베이스) → Validation Agent (GMP RAG DB) → Documentation Agent → Final Layout 도면. 좌측은 메인 파이프라인, 우측은 각 단계가 참조하는 knowledge base.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowmuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888"/>
    </marker>
  </defs>

  <style>
    .main-box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 1.5; }
    .final-box { fill: #f0f0f0; stroke: #1a1a1a; stroke-width: 1.5; }
    .kb-box { fill: #f6f6f6; stroke: #1a1a1a; stroke-width: 1; stroke-dasharray: 4 3; }
    .stage-text { font: 600 14px system-ui, -apple-system, sans-serif; fill: #1a1a1a; text-anchor: middle; }
    .stage-subtext { font: 400 11px system-ui, sans-serif; fill: #666; text-anchor: middle; }
    .kb-text { font: 600 12px system-ui, sans-serif; fill: #1a1a1a; text-anchor: middle; }
    .kb-subtext { font: 400 10px system-ui, sans-serif; fill: #666; text-anchor: middle; }
    .edge-label { font: 400 10px system-ui, sans-serif; fill: #666; }
    .flow-line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    .kb-line { stroke: #888888; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
  </style>

  <rect class="main-box" x="220" y="20" width="180" height="44" rx="6"/>
  <text class="stage-text" x="310" y="40">User</text>
  <text class="stage-subtext" x="310" y="56">설계자</text>
  <line class="flow-line" x1="310" y1="64" x2="310" y2="92" marker-end="url(#arrow)"/>

  <rect class="main-box" x="220" y="92" width="180" height="58" rx="6"/>
  <text class="stage-text" x="310" y="116">웹폼 (URS 입력)</text>
  <text class="stage-subtext" x="310" y="134">3 시트 폼 채우기</text>
  <line class="flow-line" x1="310" y1="150" x2="310" y2="180" marker-end="url(#arrow)"/>
  <text class="edge-label" x="320" y="168">Excel / JSON</text>

  <rect class="main-box" x="220" y="180" width="180" height="58" rx="6"/>
  <text class="stage-text" x="310" y="204">URS Parser</text>
  <text class="stage-subtext" x="310" y="222">시트 → Input JSON</text>

  <rect class="kb-box" x="450" y="180" width="220" height="58" rx="6"/>
  <text class="kb-text" x="560" y="204">URS Template (xlsx)</text>
  <text class="kb-subtext" x="560" y="222">제조공정·Room·장비 3 시트</text>
  <line class="kb-line" x1="450" y1="209" x2="403" y2="209" marker-end="url(#arrowmuted)"/>

  <line class="flow-line" x1="310" y1="238" x2="310" y2="268" marker-end="url(#arrow)"/>
  <text class="edge-label" x="320" y="256">Input JSON</text>

  <rect class="main-box" x="200" y="268" width="220" height="78" rx="6"/>
  <text class="stage-text" x="310" y="293">Rule Engine</text>
  <text class="stage-subtext" x="310" y="310">URS 통과 + adjacency·flow</text>
  <text class="stage-subtext" x="310" y="325">·면적·DP·AL타입 derive</text>

  <rect class="kb-box" x="450" y="278" width="220" height="58" rx="6"/>
  <text class="kb-text" x="560" y="302">GMP Layout Logic (xlsx)</text>
  <text class="kb-subtext" x="560" y="320">12개 룰 + Room/장비 KB</text>
  <line class="kb-line" x1="450" y1="307" x2="423" y2="307" marker-end="url(#arrowmuted)"/>

  <line class="flow-line" x1="310" y1="346" x2="310" y2="376" marker-end="url(#arrow)"/>
  <text class="edge-label" x="320" y="364">7 blocks</text>

  <rect class="main-box" x="200" y="376" width="220" height="78" rx="6"/>
  <text class="stage-text" x="310" y="401">Validation Agent</text>
  <text class="stage-subtext" x="310" y="418">RAG로 GMP cross-check</text>
  <text class="stage-subtext" x="310" y="433">flag 항목 최종 판정</text>

  <rect class="kb-box" x="450" y="386" width="220" height="58" rx="6"/>
  <text class="kb-text" x="560" y="410">GMP RAG DB</text>
  <text class="kb-subtext" x="560" y="428">FDA·EU·WHO·ISO 533 chunks</text>
  <line class="kb-line" x1="450" y1="415" x2="423" y2="415" marker-end="url(#arrowmuted)"/>

  <path class="flow-line" d="M 200 415 Q 140 415 140 307 Q 140 250 175 250 L 197 250" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text class="edge-label" x="68" y="350">if violation</text>
  <text class="edge-label" x="80" y="365">(feedback)</text>

  <line class="flow-line" x1="310" y1="454" x2="310" y2="484" marker-end="url(#arrow)"/>
  <text class="edge-label" x="320" y="472">approved 7 blocks</text>

  <rect class="main-box" x="220" y="484" width="180" height="58" rx="6"/>
  <text class="stage-text" x="310" y="508">Documentation Agent</text>
  <text class="stage-subtext" x="310" y="526">좌표 배치 + 도면 렌더</text>

  <line class="flow-line" x1="310" y1="542" x2="310" y2="572" marker-end="url(#arrow)"/>

  <rect class="final-box" x="220" y="572" width="180" height="46" rx="6"/>
  <text class="stage-text" x="310" y="594">Final Layout 도면</text>
  <text class="stage-subtext" x="310" y="610">CAD / SVG 출력</text>

  <g transform="translate(40, 660)">
    <rect class="main-box" x="0" y="0" width="14" height="14" rx="2"/>
    <text x="20" y="11" style="font: 400 11px system-ui, sans-serif; fill: #1a1a1a;">파이프라인 단계</text>
    <rect class="kb-box" x="150" y="0" width="14" height="14" rx="2"/>
    <text x="170" y="11" style="font: 400 11px system-ui, sans-serif; fill: #1a1a1a;">Knowledge base</text>
    <line class="flow-line" x1="320" y1="7" x2="350" y2="7" marker-end="url(#arrow)"/>
    <text x="356" y="11" style="font: 400 11px system-ui, sans-serif; fill: #1a1a1a;">데이터 흐름</text>
    <line class="kb-line" x1="450" y1="7" x2="480" y2="7" marker-end="url(#arrowmuted)"/>
    <text x="486" y="11" style="font: 400 11px system-ui, sans-serif; fill: #1a1a1a;">참조 / lookup</text>
  </g>
</svg>
